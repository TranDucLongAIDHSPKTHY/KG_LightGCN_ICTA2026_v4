# configs/model/simgcl.yaml
# ─────────────────────────────────────────────────────────────────────────────
# SimGCL — Yu et al., SIGIR 2022
# Ref: https://github.com/Coder-Yu/QRec  (SimGCL.conf)
#
# Paper / QRec defaults:
#   lr=0.001, L2=0, batch=2048, emb=64, n_layers=3
#   eps=0.1, tau(temperature)=0.2, lambda_cl=0.5
#   Note: QRec uses L2=0 (no weight_decay on embeddings)!
#
# Changes from project v4:
#   [PARAM-1] weight_decay: base.yaml sets 1e-4, but SimGCL paper uses L2=0.
#             FIXED: override weight_decay: 0 here.
#             (SimGCL author confirmed τ=0.2, λ=0.5 as standard; lambda_cl=0.01
#             or τ=0.1 both cause significant performance drops.)
#   [PARAM-2] eps: 0.1 → MATCHES paper ✓
#   [PARAM-3] temperature: 0.2 → MATCHES paper ✓
#   [PARAM-4] lambda_cl: 0.5 → MATCHES paper ✓
#   [PARAM-5] n_layers: 3 → MATCHES paper ✓
# ─────────────────────────────────────────────────────────────────────────────
model:
  name: simgcl
  n_layers: 3
  eps: 0.1 # uniform noise magnitude ε per dimension; paper: 0.1
  apply_item_cl: false # paper also CL on items; false for user-only (faster)

train:
  weight_decay: 0.0 # FIXED: SimGCL paper/QRec uses L2=0 (not 1e-4)

contrastive:
  temperature: 0.2 # τ; paper: 0.2 (sensitive — don't change to 0.1)
  lambda_cl: 0.5 # λ; paper: 0.5 best on most datasets
