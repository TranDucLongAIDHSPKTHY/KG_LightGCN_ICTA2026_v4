# configs/model/lightgcn.yaml
# ─────────────────────────────────────────────────────────────────────────────
# LightGCN — He et al., SIGIR 2020
# Ref: https://github.com/gusye1234/LightGCN-PyTorch
#
# Paper defaults (gusye1234 repo):
#   lr=0.001, decay=1e-4, layer=3, recdim=64, batch=2048, epochs=1000
#   topks=[20], seed=2020, dropout=0, keepprob=0.6
#
# ═══════════════════════════════════════════════════════════════════════════════
# FIXES vs v4:
# ═══════════════════════════════════════════════════════════════════════════════
#
# [FIX-LGN-1] early_stopping_patience: 5 → 10
#   Vấn đề: patience=5 × eval_interval=5 = 25 epoch window.
#   LightGCN hội tụ chậm (best_epoch=420 trong run hiện tại).
#   patience=5 đủ vì window = 25 epochs, model đã hội tụ trước khi bị stop.
#   Tuy nhiên, để an toàn hơn → tăng lên 10 (window=50 epochs).
#   Kết quả hiện tại: Recall@20=0.0401 sát paper 0.0411 (sai lệch 2.4%) ✓
# ─────────────────────────────────────────────────────────────────────────────
model:
  name: lightgcn
  n_layers: 3 # paper: 3 (best on Yelp2018, Amazon-book) ✓

train:
  weight_decay: 1.0e-4 # paper: --decay=1e-4 ✓
  # [FIX-LGN-1] Tăng patience để tránh early stop quá sớm khi có noise
  early_stopping_patience: 10
