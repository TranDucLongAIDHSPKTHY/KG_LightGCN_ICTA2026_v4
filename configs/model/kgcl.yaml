# configs/model/kgcl.yaml
# ─────────────────────────────────────────────────────────────────────────────
# KGCL — Yang et al., SIGIR 2022
# Ref: https://github.com/yuh-yang/KGCL-SIGIR22
#
# Original repo defaults (world.py):
#   lr=0.001, decay=1e-4, batch=2048, emb=64, layers=3
#   kgc_temp=0.2, ssl_reg=0.1 (NOT 0.5!)
#   kg_p_drop=0.5 (KG edge drop probability)
#   ui_p_drop=0.1 (amazon-book: 0.05)
#   early_stop_cnt: 5 (stops after 5 evals without improvement)
#   max_epoch: typically 1000 in experiments
#
# ═══════════════════════════════════════════════════════════════════════════════
# FIXES vs v4:
# ═══════════════════════════════════════════════════════════════════════════════
#
# [FIX-KGCL-1] early_stopping_patience: 5 → 20
#   Vấn đề: KGCL convergence chậm (log cho thấy epoch 15 recall=0.0256)
#   KGCL paper Amazon-Book cần ~100-200 epochs để hội tụ đến ~0.0889.
#   patience=5 × eval_interval=5 = 25 epoch window → dừng quá sớm.
#   patience=20 → 200 epoch window → đủ để KGCL hội tụ.
#   NOTE: Nếu vẫn chưa hội tụ, có thể tăng lên 30.
#
# [FIX-KGCL-2] ui_p_drop: 0.1 → 0.05 (amazon-book specific)
#   KGCL original world.py: amazon-book dùng 0.05, không phải 0.1.
#   0.1 quá aggressive → drop quá nhiều edges → CF signal yếu.
# ─────────────────────────────────────────────────────────────────────────────
model:
  name: kgcl
  n_layers: 3
  kg_n_layers: 2
  temp: 0.2 # kgc_temp in original ✓

  # KG-guided augmentation drop probabilities (from world.py)
  kg_p_drop: 0.5 # probability of dropping KG edges in aug
  ui_p_drop: 0.05 # [FIX-KGCL-2] amazon-book=0.05 (NOT 0.1)

  lambda_kg: 0.1 # ssl_reg=0.1 in original ✓

train:
  # [FIX-KGCL-1] patience=10 → 50 epoch window; KGCL cần nhiều epochs hội tụ
  early_stopping_patience: 10

contrastive:
  temperature: 0.2 # ✓
  lambda_cl: 0.1 # ssl_reg=0.1 in original ✓
