# configs/model/kg_lightgcn_cl.yaml
# Biến thể 2: KG-LightGCN-CL (Enhanced/Proposed)
model:
  name: kg_lightgcn_cl
  n_layers: 3
  kg_n_layers: 2
  kg_type: full          # full | category | brand | none
  entity_agg: mean
  kg_reg: 1.0e-5
  eps: 0.1               # noise magnitude for CF augmented view

contrastive:
  temperature: 0.2       # InfoNCE temperature (fairness: 0.2)
  lambda_cl: 0.5         # CL loss weight (fairness: 0.5)
