# configs/model/kgat.yaml  — FIXED VERSION
# ─────────────────────────────────────────────────────────────────────────────
# KGAT — Wang et al., KDD 2019
# Ref: https://github.com/xiangwang1223/knowledge_graph_attention_network
#
# Paper/repo defaults (Amazon-Book):
#   lr=0.0001, embed_size=64, kge_size=64
#   layer_size=[64,32,16] (3 layers, alg_type=bi)
#   batch_size=1024 (CF), batch_size_kg=2048 (KG)
#   regs=[1e-5, 1e-5, 1e-2]
#   node_dropout=0.1, mess_dropout=0.1
#   epoch=1000
#
# ═══════════════════════════════════════════════════════════════════════════════
# FIXES vs v4:
# ═══════════════════════════════════════════════════════════════════════════════
#
# [FIX-1] early_stopping_patience: 5 → 50  ← QUAN TRỌNG NHẤT
#   Vấn đề: patience=5 × eval_interval=5 = chỉ 25 epoch window.
#   Amazon-Book KGAT cần 300–1000 epochs để hội tụ (paper train 1000 epochs).
#   Mô hình dừng quá sớm ở epoch ~50–100, chưa kịp học.
#   Fix: patience=50 → 250 epoch window — đủ thời gian hội tụ.
#
# [FIX-2] kg_reg đặt trong "model" section (không phải model_extra)
#   Vấn đề: KGTrainer đọc từ cfg["model"]["kg_reg"],
#   nhưng v4 đặt trong cfg["model_extra"]["kg_reg"] → không đọc được.
#   Fix: đặt kg_reg trực tiếp trong "model" section.
#
# [FIX-3] layer_agg xóa (không còn W_out concat+projection)
#   Vấn đề: models/kgat.py v4 dùng W_out(concat([e1, e2, e3])) không có trong paper.
#   Fix: KGAT model mới (FIXED) dùng mean pooling qua tất cả K+1 layers.
#   Config không cần khai báo layer_agg nữa.
#
# [FIX-4] Thêm kg_refresh_steps cho alternating training tốt hơn
#   0 = 1 lần/epoch (tiết kiệm VRAM, default)
#   100 = refresh mỗi 100 batch (accuracy tốt hơn, tốn VRAM hơn)
# ─────────────────────────────────────────────────────────────────────────────
model:
  name: kgat
  n_layers: 3 # paper benchmark: [64,32,16] = 3 layers ✓
  relation_dim: 64 # paper: kge_size=64 ✓
  agg_type: bi-interaction # paper: alg_type=bi ✓
  # FIX [FIX-2]: kg_reg trong "model" section để KGTrainer đọc được
  kg_reg: 1.0e-5 # TransR regularisation (paper regs[1]=1e-5 cho entity)

train:
  learning_rate: 0.0001 # paper: lr=1e-4 ✓  (KHÁC với base.yaml 1e-3!)
  weight_decay: 1.0e-5 # paper: regs[0]=1e-5 for user/entity emb ✓

  # FIX [FIX-1]: CRITICAL — tăng patience để model đủ thời gian hội tụ
  # Paper train 1000 epochs. eval_interval=10, patience=10 → 50 epoch window.
  early_stopping_patience: 10

  # KG-specific
  kg_batch_size: 2048 # paper: batch_size_kg=2048 ✓

  # FIX [FIX-4]: Entity emb refresh strategy
  # 0 = chỉ recompute 1 lần/epoch (tiết kiệm VRAM, phù hợp RTX 3050)
  # 100 = recompute mỗi 100 batch (accuracy tốt hơn, tốn ~250MB VRAM thêm)
  kg_refresh_steps: 0
