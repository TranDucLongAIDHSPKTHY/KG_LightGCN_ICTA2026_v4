# configs/base.yaml
# ─────────────────────────────────────────────────────────────────────────────
# BASE CONFIGURATION — dùng chung cho TẤT CẢ models (fairness constraint)
#
# IMPORTANT: Một số model ghi đè (override) các tham số base tại đây:
#   - KGAT:   learning_rate → 0.0001, weight_decay → 1e-5
#   - SimGCL: weight_decay → 0.0
#   - KGCL:   lambda_cl/lambda_kg → 0.1, early_stopping_patience → 5
#
# Path override qua .env (ưu tiên hơn yaml):
#   DATA_ROOT=/hdd/datasets       → thay dataset.data_dir
#   RESULTS_ROOT=/ssd/results     → thay logging.*
#   NUM_WORKERS=4                 → thay train.num_workers
#   DEVICE=cuda                   → thay train.device
# ─────────────────────────────────────────────────────────────────────────────

# ── Dataset ───────────────────────────────────────────────────────────────────
dataset:
  name: amazon-book # amazon-book | yelp2018
  data_dir: /data/phuongtran/processed # data/processed
  cold_split: null # null | cold_10 | cold_20 | cold_30
  kg_type: full # full | category | brand | none

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  name: lightgcn
  embedding_dim: 64 # HARD CONSTRAINT — không đổi per-model
  n_layers: 3

# ── Training ──────────────────────────────────────────────────────────────────
train:
  epochs: 1000
  batch_size: 2048
  learning_rate: 0.001 # LightGCN/SimGCL/KGCL default; KGAT overrides to 0.0001
  optimizer: adam
  weight_decay: 1.0e-4 # LightGCN/KGCL default; SimGCL overrides to 0; KGAT to 1e-5
  neg_samples: 1
  early_stopping_patience: 10 # KGCL overrides to 5
  early_stopping_metric: recall@20
  seed: 42
  device: auto # auto | cpu | cuda | cuda:0
  num_workers: 4

# ── Evaluation ────────────────────────────────────────────────────────────────
eval:
  batch_size: 2048
  top_k: [10, 20]
  full_ranking: true
  metrics: [recall, ndcg, hr]
  eval_interval: 5 # evaluate mỗi N epoch

# ── Contrastive learning (SimGCL / KGCL / KG-LightGCN-CL) ───────────────────
# Per-model overrides:
#   SimGCL: lambda_cl=0.5, temperature=0.2  (paper values)
#   KGCL:   lambda_cl=0.1, temperature=0.2  (original world.py: ssl_reg=0.1)
contrastive:
  temperature: 0.2
  lambda_cl: 0.5

# ── Logging & Checkpointing ───────────────────────────────────────────────────
logging:
  log_dir: results/logs
  checkpoint_dir: results/checkpoints
  result_dir: results/tables
  log_interval: 1

# ── Reproducibility ───────────────────────────────────────────────────────────
reproducibility:
  seeds: [42, 0, 1, 2, 3]
  verify_preprocessing: true
