# docker-compose.yml — KG-LightGCN ICTA2026
# ─────────────────────────────────────────────────────────────────────────────
# Cách dùng:
#   GPU:  docker compose --profile gpu up train-lightgcn
#   CPU:  docker compose --profile cpu up train-lightgcn-cpu
#
# Dataset lưu trên HDD  → bind mount vào /datasets (read-only)
# Results lưu trên SSD  → bind mount vào /results  (read-write)
#
# KHÔNG dùng --rm khi train để có thể xem log/debug sau khi chạy xong.
# Dùng --rm chỉ cho các lệnh thoáng qua (check, preprocess, aggregate).
#
# Tùy chỉnh paths trong file .env:
#   DATA_ROOT=/hdd/datasets
#   RESULTS_ROOT=/ssd/kg-lightgcn/results
#   NUM_WORKERS=2
# ─────────────────────────────────────────────────────────────────────────────

# ── Shared anchor: GPU ────────────────────────────────────────────────────────
x-gpu: &gpu
  image: kg-lightgcn:gpu
  build:
    context: .
    args:
      MODE: gpu
  env_file: .env # đọc DATA_ROOT, RESULTS_ROOT, NUM_WORKERS từ .env
  environment:
    - DATA_ROOT=${DATA_ROOT:-/datasets}
    - RESULTS_ROOT=${RESULTS_ROOT:-/results}
    - DEVICE=${DEVICE:-auto}
    - NUM_WORKERS=${NUM_WORKERS:-2}
  volumes:
    # Dataset trên HDD → read-only trong container
    - ${DATA_ROOT:-./data/processed}:/datasets:ro
    # Results trên SSD → read-write (logs, checkpoints, tables)
    - ${RESULTS_ROOT:-./results}:/results:rw
  mem_limit: 20g
  shm_size: 4g
  profiles: [gpu]
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

# ── Shared anchor: CPU ────────────────────────────────────────────────────────
x-cpu: &cpu
  image: kg-lightgcn:cpu
  build:
    context: .
    args:
      MODE: cpu
  env_file: .env
  environment:
    - DATA_ROOT=${DATA_ROOT:-/datasets}
    - RESULTS_ROOT=${RESULTS_ROOT:-/results}
    - DEVICE=cpu
    - NUM_WORKERS=${NUM_WORKERS:-6}
  volumes:
    - ${DATA_ROOT:-./data/processed}:/datasets:ro
    - ${RESULTS_ROOT:-./results}:/results:rw
  # CPU dùng nhiều RAM hơn (không có VRAM riêng)
  mem_limit: 28g
  shm_size: 2g
  profiles: [cpu]

services:
  # ─── Kiểm tra môi trường (--rm ok vì chỉ in info) ─────────────────────────
  check-gpu:
    <<: *gpu
    command: >
      python3 -c "
      import torch, os;
      print('=== GPU Environment ===');
      print('PyTorch:', torch.__version__);
      print('CUDA:', torch.cuda.is_available());
      print('GPU:', torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'N/A');
      print('DATA_ROOT:', os.getenv('DATA_ROOT'));
      print('RESULTS_ROOT:', os.getenv('RESULTS_ROOT'));
      print('NUM_WORKERS:', os.getenv('NUM_WORKERS'));
      from models.lightgcn import LightGCN; print('Models: OK');
      "

  check-cpu:
    <<: *cpu
    command: >
      python3 -c "
      import torch, os;
      print('=== CPU Environment ===');
      print('PyTorch:', torch.__version__);
      print('CUDA:', torch.cuda.is_available());
      print('DATA_ROOT:', os.getenv('DATA_ROOT'));
      print('RESULTS_ROOT:', os.getenv('RESULTS_ROOT'));
      print('NUM_WORKERS:', os.getenv('NUM_WORKERS'));
      from models.lightgcn import LightGCN; print('Models: OK');
      "

  # ─── Preprocessing (chạy 1 lần, CPU đủ) ──────────────────────────────────
  # Dùng --rm vì chỉ tạo file, không cần giữ container
  preprocess:
    <<: *cpu
    profiles: [cpu, gpu]
    volumes:
      # Preprocessing CẦN ghi vào dataset dir nên mount read-write
      - ${DATA_ROOT:-./data/processed}:/datasets:rw
      - ${RESULTS_ROOT:-./results}:/results:rw
    command: >
      bash -c "
      python3 scripts/download_data.py --dataset all &&
      python3 scripts/preprocess.py --dataset all &&
      python3 scripts/build_cold_split.py --dataset all --ratio 10 20 30
      "

  # ─── GPU: Train ───────────────────────────────────────────────────────────
  # KHÔNG dùng --rm → giữ container để xem log sau khi train xong:
  #   docker compose logs -f train-lightgcn
  #   docker exec -it <container_id> bash
  train-lightgcn:
    <<: *gpu
    container_name: kg_train_lightgcn
    command: python3 main.py --model lightgcn --dataset amazon-book --seeds 42

  train-simgcl:
    <<: *gpu
    container_name: kg_train_simgcl
    command: python3 main.py --model simgcl --dataset amazon-book --seeds 42

  train-kgat:
    <<: *gpu
    container_name: kg_train_kgat
    command: python3 main.py --model kgat --dataset amazon-book --seeds 42

  train-kgcl:
    <<: *gpu
    container_name: kg_train_kgcl
    command: python3 main.py --model kgcl --dataset amazon-book --seeds 42

  train-kg-lightgcn:
    <<: *gpu
    container_name: kg_train_kg_lightgcn
    command: python3 main.py --model kg_lightgcn --dataset amazon-book --seeds 42

  train-kg-lightgcn-cl:
    <<: *gpu
    container_name: kg_train_kg_lightgcn_cl
    command: python3 main.py --model kg_lightgcn_cl --dataset amazon-book --seeds 42

  train-all-gpu:
    <<: *gpu
    container_name: kg_train_all_gpu
    command: python3 main.py --model all --dataset amazon-book --seeds 42 0 1 2 3

  # ─── CPU: Train ───────────────────────────────────────────────────────────
  train-lightgcn-cpu:
    <<: *cpu
    container_name: kg_train_lightgcn_cpu
    command: python3 main.py --model lightgcn --dataset amazon-book --seeds 42

  train-simgcl-cpu:
    <<: *cpu
    container_name: kg_train_simgcl_cpu
    command: python3 main.py --model simgcl --dataset amazon-book --seeds 42

  train-kgat-cpu:
    <<: *cpu
    container_name: kg_train_kgat_cpu
    command: python3 main.py --model kgat --dataset amazon-book --seeds 42

  train-kgcl-cpu:
    <<: *cpu
    container_name: kg_train_kgcl_cpu
    command: python3 main.py --model kgcl --dataset amazon-book --seeds 42

  train-kg-lightgcn-cpu:
    <<: *cpu
    container_name: kg_train_kg_lightgcn_cpu
    command: python3 main.py --model kg_lightgcn --dataset amazon-book --seeds 42

  train-kg-lightgcn-cl-cpu:
    <<: *cpu
    container_name: kg_train_kg_lightgcn_cl_cpu
    command: python3 main.py --model kg_lightgcn_cl --dataset amazon-book --seeds 42

  train-all-cpu:
    <<: *cpu
    container_name: kg_train_all_cpu
    command: python3 main.py --model all --dataset amazon-book --seeds 42 0 1 2 3

  # ─── Ablation / Sensitivity ───────────────────────────────────────────────
  ablation:
    <<: *gpu
    container_name: kg_ablation
    command: bash scripts/run_ablation.sh

  sensitivity:
    <<: *gpu
    container_name: kg_sensitivity
    command: python3 scripts/run_sensitivity.py --dataset amazon-book --param all

  # ─── Aggregate results (--rm ok, chỉ đọc files) ──────────────────────────
  aggregate:
    <<: *cpu
    profiles: [cpu, gpu]
    command: python3 results/aggregate.py --dataset amazon-book

  # ─── Interactive shell (debug) ────────────────────────────────────────────
  shell-gpu:
    <<: *gpu
    container_name: kg_shell_gpu
    entrypoint: bash
    stdin_open: true
    tty: true

  shell-cpu:
    <<: *cpu
    container_name: kg_shell_cpu
    entrypoint: bash
    stdin_open: true
    tty: true
